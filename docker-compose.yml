services:
  app:
    build:
      context: .
      target: dev
    image: portfolio:dev
    container_name: portfolio-dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    profiles: ["dev"]

  web:
    build:
      context: .
      target: production
    image: portfolio:latest
    container_name: portfolio-web
    ports:
      - "8080:80"
    restart: unless-stopped
    profiles: ["prod"]
